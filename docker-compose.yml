services:
  research-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    image: feishu-research-assistant:latest
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      APP_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    healthcheck:
      test: ["CMD", "./scripts/health_check.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
